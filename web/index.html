<!DOCTYPE html>
<html lang="zh-CN" data-theme="symbian">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QQ Chat History Reader</title>
<link rel="stylesheet" href="/api/themes/symbian" id="theme-css">
<style>
.skeleton-contacts {
  padding: 0;
}
.skeleton-contact-row {
  display: flex;
  align-items: center;
  padding: 10px 14px;
  gap: 10px;
  border-bottom: 1px solid #f0f0f0;
}
.skeleton-circle {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: linear-gradient(90deg, #e8e8e8 25%, #f5f5f5 50%, #e8e8e8 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  flex-shrink: 0;
}
.skeleton-lines {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.skeleton-line {
  height: 12px;
  border-radius: 4px;
  background: linear-gradient(90deg, #e8e8e8 25%, #f5f5f5 50%, #e8e8e8 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
}
.skeleton-line.short {
  width: 60%;
}
.skeleton-messages {
  padding: 16px 20px;
}
.skeleton-msg {
  display: flex;
  flex-direction: column;
  margin-bottom: 16px;
}
.skeleton-msg.right {
  align-items: flex-end;
}
.skeleton-msg.left {
  align-items: flex-start;
}
.skeleton-bubble {
  height: 40px;
  width: 55%;
  border-radius: 12px;
  background: linear-gradient(90deg, #e8e8e8 25%, #f5f5f5 50%, #e8e8e8 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
}
.skeleton-bubble.small {
  height: 28px;
  width: 35%;
}
.skeleton-time {
  height: 8px;
  width: 50px;
  margin-top: 6px;
  border-radius: 4px;
  background: linear-gradient(90deg, #e8e8e8 25%, #f5f5f5 50%, #e8e8e8 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
}
@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
#theme-loading {
  position: fixed;
  inset: 0;
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,0.6);
  transition: opacity 0.2s;
}
#theme-loading.hidden {
  display: none;
}
.theme-spinner {
  width: 32px;
  height: 32px;
  border: 3px solid #ddd;
  border-top-color: #999;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <select id="account-select"></select>
      <div id="sidebar-actions">
        <button id="btn-open-dir" title="Open Chat History Folder">📁</button>
        <button id="btn-theme" title="切换主题 / Switch Theme">🎨</button>
        <button id="btn-lang" title="Switch Language">中</button>
      </div>
    </div>
    <div id="contact-list"></div>
  </div>
  <div id="main">
    <div id="chat-header">
      <div id="chat-title" data-i18n="select_contact">选择一个联系人开始查看</div>
    </div>
    <div id="chat-messages"></div>
  </div>
  <div id="theme-loading" class="hidden">
    <div class="theme-spinner"></div>
  </div>
</div>

<div id="welcome-overlay" class="overlay">
  <div class="overlay-box">
    <h2 data-i18n="welcome_title">QQ 聊天记录查看器</h2>
    <p data-i18n="welcome_msg">请选择聊天记录所在的文件夹以开始使用。</p>
    <button id="btn-welcome-open" class="btn-primary" data-i18n="welcome_btn">选择文件夹</button>
  </div>
</div>

<div id="theme-panel" class="panel hidden">
  <div class="panel-overlay"></div>
  <div class="panel-content">
    <h3 data-i18n="select_theme">选择主题</h3>
    <div id="theme-list"></div>
    <button class="btn-close" data-i18n="close">关闭</button>
  </div>
</div>

<script>
const I18N = {
  zh: {
    title: 'QQ 聊天记录查看器',
    select_contact: '选择一个联系人开始查看',
    loading: '加载中...',
    no_messages: '暂无消息',
    you: '我',
    friend: '好友',
    sent: '发送',
    received: '接收',
    system_msg: '系统消息',
    select_theme: '选择主题',
    close: '关闭',
    image: '图片',
    contacts_fmt: '{n} 个联系人',
    select_account: '选择账号',
    no_contacts: '暂无联系人',
    welcome_title: 'QQ 聊天记录查看器',
    welcome_msg: '请选择聊天记录所在的文件夹以开始使用。',
    welcome_btn: '选择文件夹',
    invalid_dir: '所选文件夹不包含有效的聊天记录',
  },
  en: {
    title: 'QQ Chat History Reader',
    select_contact: 'Select a contact to view',
    loading: 'Loading...',
    no_messages: 'No messages',
    you: 'Me',
    friend: 'Friend',
    sent: 'Sent',
    received: 'Received',
    system_msg: 'System',
    select_theme: 'Select Theme',
    close: 'Close',
    image: 'Image',
    contacts_fmt: '{n} contacts',
    select_account: 'Select Account',
    no_contacts: 'No contacts',
    welcome_title: 'QQ Chat History Reader',
    welcome_msg: 'Please select the folder containing your chat history to get started.',
    welcome_btn: 'Select Folder',
    invalid_dir: 'Selected folder does not contain valid chat history',
  }
};

let currentLang = 'zh';
let currentTheme = 'symbian';
let currentAccount = null;
let currentContact = null;
let _accountListenerAttached = false;

function t(key, params) {
  let text = I18N[currentLang][key] || key;
  if (params) {
    for (const k in params) {
      text = text.replace('{' + k + '}', params[k]);
    }
  }
  return text;
}

function formatTime(ts) {
  const d = new Date(ts * 1000);
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

async function api(path) {
  const res = await fetch(path);
  return res.json();
}

async function init() {
  document.getElementById('btn-lang').addEventListener('click', toggleLang);
  document.getElementById('btn-theme').addEventListener('click', toggleThemePanel);
  document.getElementById('btn-open-dir').addEventListener('click', openDirectory);
  document.getElementById('btn-welcome-open').addEventListener('click', openDirectory);
  document.querySelector('#theme-panel .btn-close').addEventListener('click', toggleThemePanel);
  document.querySelector('#theme-panel .panel-overlay').addEventListener('click', toggleThemePanel);

  await loadThemes();
  updateUI();

  const config = await api('/api/config');
  if (config.has_valid_dir) {
    document.getElementById('welcome-overlay').classList.add('hidden');
    await loadAccounts();
  }
}

function populateAccountSelect(accounts) {
  const sel = document.getElementById('account-select');
  sel.innerHTML = '';
  if (accounts.length === 0) {
    sel.innerHTML = `<option>${t('no_contacts')}</option>`;
    return;
  }
  accounts.forEach(acc => {
    const opt = document.createElement('option');
    opt.value = acc.qq_number;
    opt.textContent = `${acc.qq_number} (${t('contacts_fmt', {n: acc.contact_count})})`;
    sel.appendChild(opt);
  });
  if (!_accountListenerAttached) {
    sel.addEventListener('change', () => selectAccount(sel.value));
    _accountListenerAttached = true;
  }
}

async function loadAccounts() {
  const accounts = await api('/api/accounts');
  populateAccountSelect(accounts);
  if (accounts.length > 0) {
    selectAccount(accounts[0].qq_number);
  }
}

async function loadAccountsFromData(accounts) {
  populateAccountSelect(accounts);
  if (accounts.length > 0) {
    selectAccount(accounts[0].qq_number);
  }
}

async function selectAccount(qq) {
  currentAccount = qq;
  currentContact = null;
  document.getElementById('chat-title').textContent = t('select_contact');
  document.getElementById('chat-messages').innerHTML = '';

  const list = document.getElementById('contact-list');
  list.innerHTML = '<div class="skeleton-contacts">' +
    Array.from({length: 7}, () =>
      '<div class="skeleton-contact-row">' +
        '<div class="skeleton-circle"></div>' +
        '<div class="skeleton-lines">' +
          '<div class="skeleton-line"></div>' +
          '<div class="skeleton-line short"></div>' +
        '</div>' +
      '</div>'
    ).join('') +
  '</div>';

  const contacts = await api(`/api/accounts/${qq}/contacts`);
  renderContactList(contacts);
}

function renderContactList(contacts) {
  const list = document.getElementById('contact-list');
  list.innerHTML = '';
  if (contacts.length === 0) {
    list.innerHTML = `<div class="empty">${t('no_contacts')}</div>`;
    return;
  }
  contacts.forEach(c => {
    const item = document.createElement('div');
    item.className = 'contact-item';
    item.dataset.qq = c.qq_number;
    const last = c.last_message;
    const preview = last ? last.content.replace(/[\x00-\x1f\x7f-\x9f]/g, '').substring(0, 30) : '';
    const time = last ? formatTime(last.timestamp) : '';
    item.innerHTML = `
      <img class="contact-avatar" src="${c.avatar_url}" onerror="this.onerror=null;this.style.display='none';this.nextElementSibling.style.display='flex';">
      <div class="contact-avatar-fallback" style="display:none;">${c.qq_number.slice(-2)}</div>
      <div class="contact-info">
        <div class="contact-name">${c.qq_number}</div>
        <div class="contact-preview">${escapeHtml(preview)}</div>
      </div>
      <div class="contact-time">${time.slice(-8)}</div>
    `;
    item.addEventListener('click', () => selectContact(c.qq_number));
    list.appendChild(item);
  });
}

async function selectContact(qq) {
  currentContact = qq;
  const chatTitle = document.getElementById('chat-title');
  chatTitle.innerHTML = `<img class="chat-header-avatar" src="/api/avatar/${currentAccount}/${qq}" onerror="this.style.display='none';"> <span>${qq}</span>`;
  document.querySelectorAll('.contact-item').forEach(el => {
    el.classList.toggle('active', el.dataset.qq === qq);
  });

  const container = document.getElementById('chat-messages');
  const sides = ['left', 'right'];
  container.innerHTML = '<div class="skeleton-messages">' +
    Array.from({length: 6}, (_, i) =>
      '<div class="skeleton-msg ' + sides[i % 2] + '">' +
        '<div class="skeleton-bubble' + (i % 3 === 0 ? ' small' : '') + '"></div>' +
        '<div class="skeleton-time"></div>' +
      '</div>'
    ).join('') +
  '</div>';

  const messages = await api(`/api/accounts/${currentAccount}/contacts/${qq}/messages`);
  renderMessages(messages);
}

function renderMessages(messages) {
  const container = document.getElementById('chat-messages');
  container.innerHTML = '';
  if (messages.length === 0) {
    container.innerHTML = `<div class="empty">${t('no_messages')}</div>`;
    return;
  }
  messages.forEach(msg => {
    const div = document.createElement('div');
    let cls = 'msg';
    if (msg.is_sent) cls += ' msg-sent';
    else if (msg.is_received) cls += ' msg-received';
    else if (msg.is_system) cls += ' msg-system';

    let label = '';
    if (msg.is_sent) label = t('you');
    else if (msg.is_received) label = t('friend');
    else if (msg.is_system) label = t('system_msg');

    const content = escapeHtml(msg.content);
    div.className = cls;
    div.innerHTML = `
      <div class="msg-label">${label}</div>
      <div class="msg-bubble">${content}</div>
      <div class="msg-time">${formatTime(msg.timestamp)}</div>
    `;
    container.appendChild(div);
  });
  container.scrollTop = container.scrollHeight;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML.replace(/\n/g, '<br>');
}

async function loadThemes() {
  const themes = await api('/api/themes');
  const list = document.getElementById('theme-list');
  list.innerHTML = '';
  themes.forEach(t => {
    const item = document.createElement('div');
    item.className = 'theme-item' + (t.id === currentTheme ? ' active' : '');
    item.textContent = t.name;
    item.addEventListener('click', () => switchTheme(t.id, item));
    list.appendChild(item);
  });
}

function switchTheme(id, el) {
  currentTheme = id;
  const loading = document.getElementById('theme-loading');
  loading.classList.remove('hidden');

  const link = document.getElementById('theme-css');
  link.href = `/api/themes/${id}`;
  document.documentElement.setAttribute('data-theme', id);
  document.querySelectorAll('.theme-item').forEach(item => item.classList.remove('active'));
  el.classList.add('active');

  link.onload = () => {
    loading.classList.add('hidden');
  };

  setTimeout(() => {
    loading.classList.add('hidden');
  }, 1500);

  toggleThemePanel();
}

function toggleThemePanel() {
  document.getElementById('theme-panel').classList.toggle('hidden');
}

function toggleLang() {
  currentLang = currentLang === 'zh' ? 'en' : 'zh';
  document.getElementById('btn-lang').textContent = currentLang === 'zh' ? '中' : 'EN';
  document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en';
  updateUI();
  refreshData();
}

function updateUI() {
  document.title = t('title');
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.getAttribute('data-i18n'));
  });
}

async function refreshData() {
  if (currentAccount) {
    const contacts = await api(`/api/accounts/${currentAccount}/contacts`);
    renderContactList(contacts);
    if (currentContact) {
      await selectContact(currentContact);
    }
  }
  await loadAccounts();
}

async function openDirectory() {
  try {
    const res = await fetch('/api/open-directory', { method: 'POST' });
    const data = await res.json();
    if (data.changed) {
      document.getElementById('welcome-overlay').classList.add('hidden');
      currentAccount = null;
      currentContact = null;
      document.getElementById('chat-title').textContent = t('select_contact');
      document.getElementById('chat-messages').innerHTML = '';
      await loadAccountsFromData(data.accounts);
    } else if (data.reason === 'invalid') {
      alert(t('invalid_dir'));
    }
  } catch (e) {
    console.error('Failed to open directory:', e);
  }
}

init();
</script>
</body>
</html>
