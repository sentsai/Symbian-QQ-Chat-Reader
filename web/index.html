<style>
.skeleton-contacts {
  padding: 0;
}
.skeleton-contact-row {
  display: flex;
  align-items: center;
  padding: 10px 14px;
  gap: 10px;
  border-bottom: 1px solid #f0f0f0;
}
.skeleton-circle {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: linear-gradient(90deg, #e8e8e8 25%, #f5f5f5 50%, #e8e8e8 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  flex-shrink: 0;
}
.skeleton-lines {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.skeleton-line {
  height: 12px;
  border-radius: 4px;
  background: linear-gradient(90deg, #e8e8e8 25%, #f5f5f5 50%, #e8e8e8 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
}
.skeleton-line.short {
  width: 60%;
}
.skeleton-messages {
  padding: 16px 20px;
}
.skeleton-msg {
  display: flex;
  flex-direction: column;
  margin-bottom: 16px;
}
.skeleton-msg.right {
  align-items: flex-end;
}
.skeleton-msg.left {
  align-items: flex-start;
}
.skeleton-bubble {
  height: 40px;
  width: 55%;
  border-radius: 12px;
  background: linear-gradient(90deg, #e8e8e8 25%, #f5f5f5 50%, #e8e8e8 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
}
.skeleton-bubble.small {
  height: 28px;
  width: 35%;
}
.skeleton-time {
  height: 8px;
  width: 50px;
  margin-top: 6px;
  border-radius: 4px;
  background: linear-gradient(90deg, #e8e8e8 25%, #f5f5f5 50%, #e8e8e8 75%);
  background-size: 200% 100%;

}
@keyframes shimmer {

#theme-loading {

<script>
const I18N = {

    cal_jan: '1月', cal_feb: '2月', cal_mar: '3月', cal_apr: '4月', cal_may: '5月', cal_jun: '6月',
    cal_jul: '7月', cal_aug: '8月', cal_sep: '9月', cal_oct: '10月', cal_nov: '11月', cal_dec: '12月',
    alias_placeholder: '输入别名...',

    no_messages: 'No messages',
    you: 'Me',
    friend: 'Friend',
    sent: 'Sent',

    contacts_fmt: '{n} contacts',
    select_account: 'Select Account',

    welcome_title: 'QQ Chat History Reader',
    welcome_msg: 'Please select the folder containing your chat history to get started.',
    welcome_btn: 'Select Folder',
    invalid_dir: 'Selected folder does not contain valid chat history',
    search_qq: 'Search QQ',
    search_messages: 'Search messages',
    no_search_results: 'No matching messages found',
    calendar_loading: 'Indexing dates...',
    calendar_month_fmt: '{month} {y}',
    cal_mon: 'Mo', cal_tue: 'Tu', cal_wed: 'We', cal_thu: 'Th', cal_fri: 'Fr', cal_sat: 'Sa', cal_sun: 'Su',
    cal_jan: 'Jan', cal_feb: 'Feb', cal_mar: 'Mar', cal_apr: 'Apr', cal_may: 'May', cal_jun: 'Jun',
    cal_jul: 'Jul', cal_aug: 'Aug', cal_sep: 'Sep', cal_oct: 'Oct', cal_nov: 'Nov', cal_dec: 'Dec',
    alias_placeholder: 'Enter alias...',
    alias_save: 'Save',
    alias_cancel: 'Cancel',
    alias_clear: 'Clear alias',
  }
};

let currentLang = 'zh';
let currentTheme = 'symbian';
let currentAccount = null;
let currentContact = null;
let _accountListenerAttached = false;
let searchResults = [];
let searchCurrentIndex = -1;
let _searchDebounceTimer = null;
let _indexReadyCache = {};
let _indexPollTimer = null;
let _calDates = [];
let _calViewYear = 0;
let _calViewMonth = 0;
let _calSelectedDate = null;
let _calYearMonthPickerOpen = false;
let _calPickerYear = 0;
let _aliases = {};
let _faceNameMap = {};
let _faceMapLoaded = false;
let _isResizing = false;
let _resizeStartX = 0;
let _resizeStartWidth = 0;
const CAL_MONTH_KEYS = ['cal_jan','cal_feb','cal_mar','cal_apr','cal_may','cal_jun','cal_jul','cal_aug','cal_sep','cal_oct','cal_nov','cal_dec'];

function t(key, params) {
  let text = I18N[currentLang][key] || key;
  if (params) {
    for (const k in params) {
      text = text.replace('{' + k + '}', params[k]);
    }
  }
  return text;
}

function formatTime(ts) {
  const d = new Date(ts * 1000);
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

async function api(path) {
  const res = await fetch(path);
  return res.json();
}

async function loadFaceMap() {
  if (_faceMapLoaded) return;
  try {
    const data = await api('/api/qq-face-map');
    _faceNameMap = {};
    for (const [index, info] of Object.entries(data)) {
      const name = info.name;
      if (!_faceNameMap[name]) {
        _faceNameMap[name] = [];
      }
      _faceNameMap[name].push({ index: parseInt(index), hasImage: info.hasImage });
    }
    _faceMapLoaded = true;
  } catch (e) {
    console.warn('Failed to load QQ face map:', e);
  }
}

function renderFaceImages(html) {
  if (!_faceMapLoaded || Object.keys(_faceNameMap).length === 0) return html;
  return html.replace(/\[([^\]]+)\]/g, (match, name) => {
    const entries = _faceNameMap[name];
    if (!entries) return match;
    const withImage = entries.find(e => e.hasImage);
    if (!withImage) return match;
    const src = `/api/qq-face/${withImage.index}`;
    return `<img src="${src}" alt="${match}" title="${name}" class="qq-face" loading="lazy">`;
  });
}

async function init() {
  document.getElementById('btn-lang').addEventListener('click', toggleLang);
  document.getElementById('btn-theme').addEventListener('click', toggleThemePanel);
  document.getElementById('btn-open-dir').addEventListener('click', openDirectory);
  document.getElementById('btn-welcome-open').addEventListener('click', openDirectory);
  document.querySelector('#theme-panel .btn-close').addEventListener('click', toggleThemePanel);
  document.querySelector('#theme-panel .panel-overlay').addEventListener('click', toggleThemePanel);
  document.getElementById('sidebar-search-input').addEventListener('input', filterContacts);
  document.getElementById('btn-chat-search').addEventListener('click', toggleChatSearch);
  document.getElementById('chat-search-input').addEventListener('input', () => {
    clearTimeout(_searchDebounceTimer);
    const keyword = document.getElementById('chat-search-input').value.trim();
    if (!keyword) {
      clearChatSearchResults();
      return;
    }
    _searchDebounceTimer = setTimeout(() => performChatSearch(), 300);
  });
  document.getElementById('chat-search-input').addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      closeChatSearch();
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      navigateSearch('next');
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      navigateSearch('prev');
    }
  });
  document.getElementById('chat-search-clear').addEventListener('click', closeChatSearch);

  document.getElementById('btn-calendar').addEventListener('click', toggleCalendar);
  document.getElementById('cal-prev-month').addEventListener('click', () => navigateCalMonth(-1));
  document.getElementById('cal-next-month').addEventListener('click', () => navigateCalMonth(1));
  document.getElementById('cal-month-label').addEventListener('click', toggleCalYearMonthPicker);
  document.getElementById('cal-prev-year').addEventListener('click', () => navigateCalPickerYear(-1));
  document.getElementById('cal-next-year').addEventListener('click', () => navigateCalPickerYear(1));
  document.addEventListener('click', handleCalOutsideClick);

  await loadThemes();
  await loadFaceMap();
  updateUI();

  const appConfig = await api('/api/app-config');
  if (appConfig.sidebar_width && appConfig.sidebar_width !== 280) {
    const sidebar = document.getElementById('sidebar');
    sidebar.style.width = appConfig.sidebar_width + 'px';
    sidebar.style.minWidth = appConfig.sidebar_width + 'px';
  }

  initSidebarResize();

  const config = await api('/api/config');
  if (config.has_valid_dir) {
    document.getElementById('welcome-overlay').classList.add('hidden');
    await loadAccounts();
  }
}

function populateAccountSelect(accounts) {
  const sel = document.getElementById('account-select');
  sel.innerHTML = '';
  if (accounts.length === 0) {
    sel.innerHTML = `<option>${t('no_contacts')}</option>`;
    return;
  }
  accounts.forEach(acc => {
    const opt = document.createElement('option');
    opt.value = acc.qq_number;
    opt.textContent = `${acc.qq_number} (${t('contacts_fmt', {n: acc.contact_count})})`;
    sel.appendChild(opt);
  });
  if (!_accountListenerAttached) {
    sel.addEventListener('change', () => selectAccount(sel.value));
    _accountListenerAttached = true;
  }
}

async function loadAccounts() {
  const accounts = await api('/api/accounts');
  populateAccountSelect(accounts);
  if (accounts.length > 0) {
    selectAccount(accounts[0].qq_number);
  }
  updateSelfAvatar();
}

async function loadAccountsFromData(accounts) {
  populateAccountSelect(accounts);
  if (accounts.length > 0) {
    selectAccount(accounts[0].qq_number);
  }
  updateSelfAvatar();
}

async function selectAccount(qq) {
  currentAccount = qq;
  currentContact = null;
  _aliases = {};
  updateSelfAvatar();
  document.getElementById('chat-title').innerHTML = `<span id="chat-title-text">${t('select_contact')}</span>`;
  document.getElementById('chat-messages').innerHTML = '';
  document.getElementById('sidebar-search-input').value = '';
  hideCalendarButton();
  stopIndexPolling();
  closeCalendar();

  const list = document.getElementById('contact-list');
  list.innerHTML = '<div class="skeleton-contacts">' +
    Array.from({length: 7}, () =>
      '<div class="skeleton-contact-row">' +
        '<div class="skeleton-circle"></div>' +
        '<div class="skeleton-lines">' +
          '<div class="skeleton-line"></div>' +
          '<div class="skeleton-line short"></div>' +
        '</div>' +
      '</div>'
    ).join('') +
  '</div>';

  try {
    const aliasData = await api(`/api/accounts/${qq}/aliases`);
    _aliases = aliasData.aliases || {};
  } catch (e) {
    _aliases = {};
  }

  const contacts = await api(`/api/accounts/${qq}/contacts`);
  renderContactList(contacts);
}

function renderContactList(contacts) {
  const list = document.getElementById('contact-list');
  list.innerHTML = '';
  if (contacts.length === 0) {
    list.innerHTML = `<div class="empty">${t('no_contacts')}</div>`;
    return;
  }
  contacts.forEach(c => {
    const item = document.createElement('div');
    item.className = 'contact-item';
    item.dataset.qq = c.qq_number;
    const last = c.last_message;
    const preview = last ? last.content.replace(/[\x00-\x1f\x7f-\x9f]/g, '').substring(0, 30) : '';
    const time = last ? formatTime(last.timestamp) : '';
    const displayName = _aliases[c.qq_number] || c.qq_number;
    item.innerHTML = `
      <img class="contact-avatar" src="${c.avatar_url}" onerror="this.onerror=null;this.style.display='none';this.nextElementSibling.style.display='flex';">
      <div class="contact-avatar-fallback" style="display:none;">${c.qq_number.slice(-2)}</div>
      <div class="contact-info">
        <div class="contact-name">${escapeHtml(displayName)}</div>
        <div class="contact-preview">${renderFaceImages(escapeHtml(preview))}</div>
      </div>
      <div class="contact-time">${time.slice(-8)}</div>
    `;
    item.addEventListener('click', () => selectContact(c.qq_number));
    list.appendChild(item);
  });
}

async function selectContact(qq) {
  closeChatSearch();
  closeCalendar();
  currentContact = qq;
  updateChatTitle();
  document.querySelectorAll('.contact-item').forEach(el => {
    el.classList.toggle('active', el.dataset.qq === qq);
  });

  hideCalendarButton();
  checkIndexReady();

  const container = document.getElementById('chat-messages');
  const sides = ['left', 'right'];
  container.innerHTML = '<div class="skeleton-messages">' +
    Array.from({length: 6}, (_, i) =>
      '<div class="skeleton-msg ' + sides[i % 2] + '">' +
        '<div class="skeleton-bubble' + (i % 3 === 0 ? ' small' : '') + '"></div>' +
        '<div class="skeleton-time"></div>' +
      '</div>'
    ).join('') +
  '</div>';

  const messages = await api(`/api/accounts/${currentAccount}/contacts/${qq}/messages`);
  renderMessages(messages);
}

function renderMessages(messages) {
  const container = document.getElementById('chat-messages');
  container.innerHTML = '';
  if (messages.length === 0) {
    container.innerHTML = `<div class="empty">${t('no_messages')}</div>`;
    return;
  }
  messages.forEach(msg => {
    const div = document.createElement('div');
    let cls = 'msg';
    if (msg.is_sent) cls += ' msg-sent';
    else if (msg.is_received) cls += ' msg-received';
    else if (msg.is_system) cls += ' msg-system';

    let label = '';
    if (msg.is_sent) label = t('you');
    else if (msg.is_received) label = _aliases[currentContact] || t('friend');
    else if (msg.is_system) label = t('system_msg');

    const content = renderFaceImages(escapeHtml(msg.content));
    div.className = cls;
    div.innerHTML = `
      <div class="msg-label">${label}</div>
      <div class="msg-bubble">${content}</div>
      <div class="msg-time">${formatTime(msg.timestamp)}</div>
    `;
    container.appendChild(div);
  });
  container.scrollTop = container.scrollHeight;

  const activeKeyword = document.getElementById('chat-search-input').value.trim();
  if (activeKeyword) {
    highlightSearchResults(activeKeyword);
  }
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML.replace(/\n/g, '<br>');
}

async function loadThemes() {
  const themes = await api('/api/themes');
  const list = document.getElementById('theme-list');
  list.innerHTML = '';
  themes.forEach(t => {
    const item = document.createElement('div');
    item.className = 'theme-item' + (t.id === currentTheme ? ' active' : '');
    item.textContent = t.name;
    item.addEventListener('click', () => switchTheme(t.id, item));
    list.appendChild(item);
  });
}

function switchTheme(id, el) {
  currentTheme = id;
  const loading = document.getElementById('theme-loading');
  loading.classList.remove('hidden');

  const link = document.getElementById('theme-css');
  link.href = `/api/themes/${id}`;
  document.documentElement.setAttribute('data-theme', id);
  document.querySelectorAll('.theme-item').forEach(item => item.classList.remove('active'));
  el.classList.add('active');

  link.onload = () => {
    loading.classList.add('hidden');
  };

  setTimeout(() => {
    loading.classList.add('hidden');
  }, 1500);

  toggleThemePanel();
}

function toggleThemePanel() {
  document.getElementById('theme-panel').classList.toggle('hidden');
}

function toggleLang() {
  currentLang = currentLang === 'zh' ? 'en' : 'zh';
  document.getElementById('btn-lang').textContent = currentLang === 'zh' ? '中' : 'EN';
  document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en';
  updateUI();
  refreshData();
}

function updateUI() {
  document.title = t('title');
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.getAttribute('data-i18n'));
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = t(el.getAttribute('data-i18n-placeholder'));
  });
}

async function refreshData() {
  if (currentAccount) {
    const contacts = await api(`/api/accounts/${currentAccount}/contacts`);
    renderContactList(contacts);
    if (currentContact) {
      await selectContact(currentContact);
    }
  }
  await loadAccounts();
}

async function openDirectory() {
  try {
    const res = await fetch('/api/open-directory', { method: 'POST' });
    const data = await res.json();
    if (data.changed) {
      document.getElementById('welcome-overlay').classList.add('hidden');
      currentAccount = null;
      currentContact = null;
      _aliases = {};
      _indexReadyCache = {};
      hideCalendarButton();
      stopIndexPolling();
      closeCalendar();
      document.getElementById('chat-title').innerHTML = `<span id="chat-title-text">${t('select_contact')}</span>`;
      document.getElementById('chat-messages').innerHTML = '';
      await loadAccountsFromData(data.accounts);
    } else if (data.reason === 'invalid') {
      alert(t('invalid_dir'));
    }

    console.error('Failed to open directory:', e);
  }
}

function filterContacts() {
  const query = document.getElementById('sidebar-search-input').value.trim().toLowerCase();
  const items = document.querySelectorAll('.contact-item');
  items.forEach(item => {
    const qq = item.dataset.qq.toLowerCase();
    const alias = (_aliases[item.dataset.qq] || '').toLowerCase();
    item.style.display = (!query || qq.includes(query) || alias.includes(query)) ? '' : 'none';
  });
}

async function performChatSearch() {
  const keyword = document.getElementById('chat-search-input').value.trim();
  if (!keyword || !currentContact || !currentAccount) return;

  const spinner = document.getElementById('chat-search-spinner');
  spinner.classList.add('visible');
  document.getElementById('chat-search-results').classList.add('hidden');
  document.getElementById('chat-search-count').textContent = '';

  try {
    const data = await api(`/api/accounts/${currentAccount}/contacts/${currentContact}/search?q=${encodeURIComponent(keyword)}`);
    const currentInput = document.getElementById('chat-search-input').value.trim();
    if (currentInput !== keyword) return;

    searchResults = data.results;
    searchCurrentIndex = searchResults.length > 0 ? 0 : -1;

    highlightSearchResults(keyword);
    renderSearchResults(keyword);
    updateSearchCount();

    if (searchCurrentIndex >= 0) {
      scrollToSearchResult(searchCurrentIndex);
    }
  } finally {
    spinner.classList.remove('visible');
  }
}

function clearChatSearchResults() {
  document.getElementById('chat-search-results').classList.add('hidden');
  document.getElementById('chat-search-count').textContent = '';
  searchResults = [];
  searchCurrentIndex = -1;
  clearHighlights();
}

function highlightSearchResults(keyword) {
  clearHighlights();
  if (!keyword) return;

  const msgElements = document.querySelectorAll('#chat-messages .msg');
  const keywordLower = keyword.toLowerCase();

  msgElements.forEach(div => {
    const bubble = div.querySelector('.msg-bubble');
    if (!bubble) return;
    const text = bubble.textContent;
    const lowerText = text.toLowerCase();
    if (!lowerText.includes(keywordLower)) return;

    let newHtml = '';
    let lastIdx = 0;
    let searchIdx = 0;
    while ((searchIdx = lowerText.indexOf(keywordLower, lastIdx)) !== -1) {
      newHtml += renderFaceImages(escapeHtml(text.substring(lastIdx, searchIdx)));
      newHtml += '<mark class="search-highlight">' + renderFaceImages(escapeHtml(text.substring(searchIdx, searchIdx + keyword.length))) + '</mark>';
      lastIdx = searchIdx + keyword.length;
    }
    newHtml += renderFaceImages(escapeHtml(text.substring(lastIdx)));
    newHtml = newHtml.replace(/\n/g, '<br>');
    bubble.innerHTML = newHtml;
  });
}

function clearHighlights() {
  document.querySelectorAll('#chat-messages mark.search-highlight').forEach(mark => {
    const parent = mark.parentNode;
    parent.replaceChild(document.createTextNode(mark.textContent), mark);
    parent.normalize();
  });
}

function renderSearchResults(keyword) {
  const container = document.getElementById('chat-search-results');
  container.innerHTML = '';

  if (searchResults.length === 0) {
    container.innerHTML = `<div class="search-no-results">${t('no_search_results')}</div>`;
    container.classList.remove('hidden');
    return;
  }

  searchResults.forEach((result, i) => {
    const row = document.createElement('div');
    row.className = 'search-result-row' + (i === searchCurrentIndex ? ' active' : '');
    row.dataset.index = i;

    let label = '';
    if (result.is_sent) label = t('you');
    else if (result.is_received) label = t('friend');
    else if (result.is_system) label = t('system_msg');

    const snippetHtml = highlightSnippet(result.snippet, keyword);

    row.innerHTML = `
      <div class="search-result-header">
        <span class="search-result-label">${label}</span>
        <span class="search-result-time">${formatTime(result.timestamp).slice(-8)}</span>
      </div>
      <div class="search-result-snippet">${snippetHtml}</div>
    `;
    row.addEventListener('click', () => {
      searchCurrentIndex = i;
      scrollToSearchResult(i);
      updateSearchCount();
      updateSearchResultActive();
    });
    container.appendChild(row);
  });

  container.classList.remove('hidden');
}

function highlightSnippet(snippet, keyword) {
  const escaped = renderFaceImages(escapeHtml(snippet));
  const keywordLower = keyword.toLowerCase();
  const snippetLower = escaped.toLowerCase();
  let idx = snippetLower.indexOf(keywordLower);
  if (idx === -1) return escaped;
  return escaped.substring(0, idx) +
    '<mark class="search-highlight">' + escaped.substring(idx, idx + keyword.length) + '</mark>' +
    escaped.substring(idx + keyword.length);
}

function scrollToSearchResult(index) {
  const result = searchResults[index];
  if (!result) return;
  const msgElements = document.querySelectorAll('#chat-messages .msg');
  if (result.index < msgElements.length) {
    const target = msgElements[result.index];
    target.scrollIntoView({ behavior: 'smooth', block: 'center' });
    target.classList.add('search-focus');
    setTimeout(() => target.classList.remove('search-focus'), 1500);
  }
  updateSearchResultActive();
}

function updateSearchResultActive() {
  document.querySelectorAll('.search-result-row').forEach((row, i) => {
    row.classList.toggle('active', i === searchCurrentIndex);
  });
}

function updateSearchCount() {
  const el = document.getElementById('chat-search-count');
  if (searchResults.length === 0) {
    el.textContent = '';
  } else {
    el.textContent = `${searchCurrentIndex + 1}/${searchResults.length}`;
  }
}

function navigateSearch(direction) {
  if (searchResults.length === 0) return;
  if (direction === 'next') {
    searchCurrentIndex = (searchCurrentIndex + 1) % searchResults.length;
  } else {
    searchCurrentIndex = (searchCurrentIndex - 1 + searchResults.length) % searchResults.length;
  }
  scrollToSearchResult(searchCurrentIndex);
  updateSearchCount();
}

function toggleChatSearch() {
  if (!currentContact) return;
  const bar = document.getElementById('chat-search-bar');
  if (bar.classList.contains('hidden')) {
    bar.classList.remove('hidden');
    document.getElementById('chat-search-input').focus();
  } else {
    closeChatSearch();
  }
}

function closeChatSearch() {
  clearTimeout(_searchDebounceTimer);
  document.getElementById('chat-search-bar').classList.add('hidden');
  document.getElementById('chat-search-results').classList.add('hidden');
  document.getElementById('chat-search-input').value = '';
  document.getElementById('chat-search-count').textContent = '';
  document.getElementById('chat-search-spinner').classList.remove('visible');
  searchResults = [];
  searchCurrentIndex = -1;
  clearHighlights();
}

async function checkIndexReady() {
  if (!currentAccount) return;
  if (_indexReadyCache[currentAccount]) {
    showCalendarButton();
    return;
  }
  try {
    const data = await api(`/api/accounts/${currentAccount}/index-status`);
    if (data.ready) {
      _indexReadyCache[currentAccount] = true;
      showCalendarButton();
      clearTimeout(_indexPollTimer);
    } else {
      hideCalendarButton();
      _indexPollTimer = setTimeout(checkIndexReady, 2000);
    }
  } catch (e) {
    _indexPollTimer = setTimeout(checkIndexReady, 2000);
  }
}

function showCalendarButton() {
  if (currentContact) {
    document.getElementById('btn-calendar').classList.add('visible');
  }
}

function hideCalendarButton() {
  document.getElementById('btn-calendar').classList.remove('visible');
}

function stopIndexPolling() {
  clearTimeout(_indexPollTimer);
}

function toggleCalendar() {
  const popover = document.getElementById('calendar-popover');
  if (popover.classList.contains('visible')) {
    closeCalendar();
  } else {
    openCalendar();
  }
}

async function openCalendar() {
  if (!currentContact || !currentAccount) return;
  const popover = document.getElementById('calendar-popover');
  popover.classList.add('visible');
  closeCalYearMonthPicker();

  try {
    const data = await api(`/api/accounts/${currentAccount}/contacts/${currentContact}/dates`);
    _calDates = data.dates || [];
  } catch (e) {
    _calDates = [];
  }

  if (_calDates.length === 0) {
    _calViewYear = new Date().getFullYear();
    _calViewMonth = new Date().getMonth() + 1;
  } else {
    const lastDate = _calDates[_calDates.length - 1].date;
    _calViewYear = parseInt(lastDate.substring(0, 4));
    _calViewMonth = parseInt(lastDate.substring(5, 7));
  }
  _calSelectedDate = null;
  renderCalendar();
}

function closeCalendar() {
  document.getElementById('calendar-popover').classList.remove('visible');
  closeCalYearMonthPicker();
}

function handleCalOutsideClick(e) {
  const popover = document.getElementById('calendar-popover');
  const btn = document.getElementById('btn-calendar');
  if (!popover.classList.contains('visible')) return;
  if (popover.contains(e.target) || btn.contains(e.target)) return;
  closeCalendar();
}

function getAvailableMonths() {
  const months = new Set();
  _calDates.forEach(d => {
    const ym = d.date.substring(0, 7);
    months.add(ym);
  });
  return months;
}

function getAvailableYears() {
  const years = new Set();
  _calDates.forEach(d => {
    years.add(parseInt(d.date.substring(0, 4)));
  });
  return years;
}

function getCalBoundMonths() {
  if (_calDates.length === 0) return null;
  const first = _calDates[0].date.substring(0, 7);
  const last = _calDates[_calDates.length - 1].date.substring(0, 7);
  return { earliest: first, latest: last };
}

function ymToValue(ym) {
  const [y, m] = ym.split('-').map(Number);
  return y * 12 + (m - 1);
}

function navigateCalMonth(delta) {
  const bounds = getCalBoundMonths();
  if (!bounds) return;
  const availableMonths = getAvailableMonths();
  const earliestVal = ymToValue(bounds.earliest);
  const latestVal = ymToValue(bounds.latest);
  let y = _calViewYear;
  let m = _calViewMonth;
  let val = ymToValue(`${y}-${String(m).padStart(2, '0')}`);

  while (true) {
    val += delta;
    if (val < earliestVal || val > latestVal) return;
    y = Math.floor(val / 12);
    m = (val % 12) + 1;
    const ym = `${y}-${String(m).padStart(2, '0')}`;
    if (availableMonths.has(ym)) break;
  }

  _calViewYear = y;
  _calViewMonth = m;
  renderCalendar();
}

function renderCalendar() {
  const label = document.getElementById('cal-month-label');
  const monthName = t(CAL_MONTH_KEYS[_calViewMonth - 1]);
  label.textContent = t('calendar_month_fmt', { y: _calViewYear, m: monthName });

  const availableMonths = getAvailableMonths();
  const bounds = getCalBoundMonths();
  const currentVal = ymToValue(`${_calViewYear}-${String(_calViewMonth).padStart(2, '0')}`);
  const earliestVal = bounds ? ymToValue(bounds.earliest) : currentVal;
  const latestVal = bounds ? ymToValue(bounds.latest) : currentVal;
  document.getElementById('cal-prev-month').disabled = (currentVal <= earliestVal);
  document.getElementById('cal-next-month').disabled = (currentVal >= latestVal);

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  const availableDates = new Set();
  _calDates.forEach(d => {
    if (d.date.startsWith(`${_calViewYear}-${String(_calViewMonth).padStart(2, '0')}-`)) {
      availableDates.add(d.date);
    }
  });

  const firstDay = new Date(_calViewYear, _calViewMonth - 1, 1);
  let startDow = firstDay.getDay();
  if (startDow === 0) startDow = 7;
  startDow -= 1;

  const daysInMonth = new Date(_calViewYear, _calViewMonth, 0).getDate();
  const today = new Date();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

  for (let i = 0; i < startDow; i++) {
    const cell = document.createElement('div');
    cell.className = 'cal-day';
    grid.appendChild(cell);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${_calViewYear}-${String(_calViewMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cell = document.createElement('div');
    cell.className = 'cal-day';
    cell.textContent = d;

    if (availableDates.has(dateStr)) {
      cell.classList.add('available');
      cell.addEventListener('click', () => selectCalDate(dateStr));
    } else {
      cell.classList.add('unavailable');
    }

    if (dateStr === todayStr) {
      cell.classList.add('today');
    }
    if (dateStr === _calSelectedDate) {
      cell.classList.add('selected');
    }

    grid.appendChild(cell);
  }

  updateCalWeekdayLabels();
}

function updateCalWeekdayLabels() {
  const keys = ['cal_mon','cal_tue','cal_wed','cal_thu','cal_fri','cal_sat','cal_sun'];
  document.querySelectorAll('.cal-weekday').forEach((el, i) => {
    el.textContent = t(keys[i]);
  });
}

async function selectCalDate(dateStr) {
  _calSelectedDate = dateStr;
  renderCalendar();

  try {
    const data = await api(`/api/accounts/${currentAccount}/contacts/${currentContact}/dates/${dateStr}/jump`);
    if (data.index !== null && data.index !== undefined) {
      const msgElements = document.querySelectorAll('#chat-messages .msg');
      if (data.index < msgElements.length) {
        const target = msgElements[data.index];
        target.scrollIntoView({ behavior: 'smooth', block: 'center' });
        target.classList.add('cal-focus');
        setTimeout(() => target.classList.remove('cal-focus'), 1500);
      }
    }
  } catch (e) {
    console.error('Failed to jump to date:', e);
  }

  closeCalendar();
}

function toggleCalYearMonthPicker() {
  if (_calYearMonthPickerOpen) {
    closeCalYearMonthPicker();
  } else {
    openCalYearMonthPicker();
  }
}

function openCalYearMonthPicker() {
  _calYearMonthPickerOpen = true;
  _calPickerYear = _calViewYear;
  document.getElementById('cal-year-month-picker').classList.add('visible');
  document.getElementById('cal-date-header').style.display = 'none';
  document.querySelector('.cal-weekdays').style.display = 'none';
  document.getElementById('cal-grid').style.display = 'none';
  renderCalYearMonthPicker();
}

function closeCalYearMonthPicker() {
  _calYearMonthPickerOpen = false;
  document.getElementById('cal-year-month-picker').classList.remove('visible');
  document.getElementById('cal-date-header').style.display = '';
  document.querySelector('.cal-weekdays').style.display = '';
  document.getElementById('cal-grid').style.display = '';
}

function navigateCalPickerYear(delta) {
  const availableYears = getAvailableYears();
  const bounds = getCalBoundMonths();
  if (!bounds) return;
  const minYear = parseInt(bounds.earliest.substring(0, 4));
  const maxYear = parseInt(bounds.latest.substring(0, 4));
  let y = _calPickerYear + delta;
  if (y < minYear || y > maxYear) return;
  while (!availableYears.has(y)) {
    y += delta;
    if (y < minYear || y > maxYear) return;
  }
  _calPickerYear = y;
  renderCalYearMonthPicker();
}

function renderCalYearMonthPicker() {
  document.getElementById('cal-picker-year').textContent = _calPickerYear;

  const availableMonths = getAvailableMonths();
  const availableYears = getAvailableYears();
  const bounds = getCalBoundMonths();
  const minYear = bounds ? parseInt(bounds.earliest.substring(0, 4)) : _calPickerYear;
  const maxYear = bounds ? parseInt(bounds.latest.substring(0, 4)) : _calPickerYear;
  document.getElementById('cal-prev-year').disabled = (_calPickerYear <= minYear);
  document.getElementById('cal-next-year').disabled = (_calPickerYear >= maxYear);

  const grid = document.getElementById('cal-month-grid');
  grid.innerHTML = '';

  for (let m = 1; m <= 12; m++) {
    const cell = document.createElement('div');
    cell.className = 'cal-month-cell';
    cell.textContent = t(CAL_MONTH_KEYS[m - 1]);

    const ym = `${_calPickerYear}-${String(m).padStart(2, '0')}`;
    if (!availableMonths.has(ym)) {
      cell.classList.add('unavailable');
    } else {
      if (_calPickerYear === _calViewYear && m === _calViewMonth) {
        cell.classList.add('selected');
      }
      cell.addEventListener('click', () => {
        _calViewYear = _calPickerYear;
        _calViewMonth = m;
        closeCalYearMonthPicker();
        renderCalendar();
      });
    }

    grid.appendChild(cell);
  }
}

function updateChatTitle() {
  const chatTitle = document.getElementById('chat-title');
  if (!currentContact || !currentAccount) {
    chatTitle.innerHTML = `<span id="chat-title-text">${t('select_contact')}</span>`;
    return;
  }
  const alias = _aliases[currentContact];
  const displayName = alias ? `${escapeHtml(alias)} (${currentContact})` : currentContact;
  chatTitle.innerHTML =
    `<img class="chat-header-avatar" src="/api/avatar/${currentAccount}/${currentContact}" onerror="this.style.display='none';">` +
    `<span id="chat-title-text">${displayName}</span>` +
    `<button class="alias-edit-btn" title="${t('alias_placeholder')}" onclick="startAliasEdit()">✏️</button>`;
}

function startAliasEdit() {
  if (!currentContact || !currentAccount) return;
  const chatTitle = document.getElementById('chat-title');
  const currentAlias = _aliases[currentContact] || '';
  chatTitle.innerHTML =
    `<img class="chat-header-avatar" src="/api/avatar/${currentAccount}/${currentContact}" onerror="this.style.display='none';">` +
    `<input class="alias-edit-input" id="alias-edit-input" type="text" value="${escapeHtml(currentAlias)}" placeholder="${t('alias_placeholder')}">` +
    `<button class="alias-save-btn" title="${t('alias_save')}" onclick="saveAliasEdit()">💾</button>` +
    (currentAlias ? `<button class="alias-clear-btn" title="${t('alias_clear')}" onclick="clearAlias()">🗑️</button>` : '') +
    `<button class="alias-cancel-btn" title="${t('alias_cancel')}" onclick="cancelAliasEdit()">✕</button>`;

  const input = document.getElementById('alias-edit-input');
  input.focus();
  input.select();
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      saveAliasEdit();
    } else if (e.key === 'Escape') {
      e.preventDefault();
      cancelAliasEdit();
    }
  });
}

async function saveAliasEdit() {
  if (!currentContact || !currentAccount) return;
  const input = document.getElementById('alias-edit-input');
  if (!input) return;
  const alias = input.value.trim();
  if (!alias) return;

  try {
    const res = await fetch(`/api/accounts/${currentAccount}/aliases/${currentContact}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ alias }),
    });
    const data = await res.json();
    _aliases = data.aliases || {};
  } catch (e) {
    console.error('Failed to save alias:', e);
  }

  updateChatTitle();
  updateSidebarAlias();
  refreshMessageLabels();
}

function cancelAliasEdit() {
  updateChatTitle();
}

async function clearAlias() {
  if (!currentContact || !currentAccount) return;

  try {
    const res = await fetch(`/api/accounts/${currentAccount}/aliases/${currentContact}`, {
      method: 'DELETE',
    });
    const data = await res.json();
    _aliases = data.aliases || {};
  } catch (e) {
    console.error('Failed to clear alias:', e);
  }

  updateChatTitle();
  updateSidebarAlias();
  refreshMessageLabels();
}

function updateSidebarAlias() {
  document.querySelectorAll('.contact-item').forEach(item => {
    const qq = item.dataset.qq;
    const nameEl = item.querySelector('.contact-name');
    if (nameEl && qq) {
      nameEl.textContent = _aliases[qq] || qq;
    }
  });
}

function refreshMessageLabels() {
  if (!currentContact) return;
  const alias = _aliases[currentContact];
  document.querySelectorAll('#chat-messages .msg-received .msg-label').forEach(el => {
    el.textContent = alias || t('friend');
  });
}

function updateSelfAvatar() {
  const img = document.getElementById('sidebar-self-avatar');
  if (!currentAccount) {
    img.style.display = 'none';
    return;
  }
  img.src = `/api/avatar/${currentAccount}/${currentAccount}`;
  img.style.display = '';
  img.onerror = () => { img.style.display = 'none'; };
}

function initSidebarResize() {
  const handle = document.getElementById('sidebar-resize-handle');
  const sidebar = document.getElementById('sidebar');

  handle.addEventListener('mousedown', (e) => {
    e.preventDefault();
    _isResizing = true;
    _resizeStartX = e.clientX;
    _resizeStartWidth = sidebar.offsetWidth;
    handle.classList.add('active');
    document.body.style.userSelect = 'none';

    const onMouseMove = (e) => {
      if (!_isResizing) return;
      const delta = e.clientX - _resizeStartX;
      const newWidth = Math.max(200, Math.min(400, _resizeStartWidth + delta));
      sidebar.style.width = newWidth + 'px';
      sidebar.style.minWidth = newWidth + 'px';
    };

    const onMouseUp = () => {
      if (!_isResizing) return;
      _isResizing = false;
      handle.classList.remove('active');
      document.body.style.userSelect = '';
      document.removeEventListener('mousemove', onMouseMove);
      document.removeEventListener('mouseup', onMouseUp);
      persistSidebarWidth(sidebar.offsetWidth);
    };

    document.addEventListener('mousemove', onMouseMove);
    document.addEventListener('mouseup', onMouseUp);
  });
}

async function persistSidebarWidth(width) {
  try {
    await fetch('/api/app-config', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sidebar_width: width }),
    });
  } catch (e) {
    console.error('Failed to persist sidebar width:', e);
  }
}

init();
</script>
